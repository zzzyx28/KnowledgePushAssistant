name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app bundle
        run: |
          pyinstaller \
            --name="KnowledgePushAssistant" \
            --windowed \
            --onedir \
            --icon=assets/icon.icns \
            --add-data="src:src" \
            --add-data="assets:assets" \
            --hidden-import="sqlalchemy.ext.declarative" \
            --osx-bundle-identifier="com.knowledgepush.assistant" \
            --clean \
            --noconfirm \
            run.py

      - name: Create DMG
        run: |
          APP_PATH="dist/KnowledgePushAssistant.app"
          DMG_NAME="KnowledgePushAssistant-${GITHUB_REF_NAME#v}.dmg"
          TMP_DMG="build/dmg_layout"
          mkdir -p "${TMP_DMG}"
          cp -R "${APP_PATH}" "${TMP_DMG}/"
          ln -s /Applications "${TMP_DMG}/Applications"
          hdiutil create \
            -volname "KnowledgePushAssistant" \
            -srcfolder "${TMP_DMG}" \
            -ov -format UDZO \
            "dist/${DMG_NAME}"
          echo "dmg_name=${DMG_NAME}" >> "${GITHUB_OUTPUT}"
        id: dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: dist/${{ steps.dmg.outputs.dmg_name }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build single exe
        run: |
          pyinstaller `
            --name="KnowledgePushAssistant" `
            --windowed `
            --onefile `
            --icon=assets/icon.ico `
            --add-data="src;src" `
            --add-data="assets;assets" `
            --hidden-import="sqlalchemy.ext.declarative" `
            --clean `
            --noconfirm `
            run.py

      - name: Rename with version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          $src = "dist/KnowledgePushAssistant.exe"
          $dst = "dist/KnowledgePushAssistant-${ver}.exe"
          Rename-Item -Path $src -NewName "KnowledgePushAssistant-${ver}.exe"
          echo "exe_name=KnowledgePushAssistant-${ver}.exe" >> $env:GITHUB_OUTPUT
        id: exe

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-exe
          path: dist/${{ steps.exe.outputs.exe_name }}

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            macOS-DMG/* \
            Windows-exe/*
