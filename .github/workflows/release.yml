name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: desktop

      - name: Build (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "KPA ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: desktop

      - name: Build (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "KPA ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

      - name: Create portable zip
        shell: pwsh
        run: |
          $binary = "desktop/src-tauri/target/release/knowledge-push-assistant-desktop.exe"
          $zipName = "KPA-${{ github.ref_name }}-windows-portable.zip"
          Compress-Archive -Path $binary -DestinationPath $zipName
          echo "portable_zip=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        run: |
          gh release upload ${{ github.ref_name }} "${{ env.portable_zip }}" --clobber
        env:
          GITHUB_TOKEN: ${{ github.token }}
